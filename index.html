<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>NEXUS | ВЫБЕРИТЕ ВАШ БАНК</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #000; height: 100vh; display: flex; overflow: hidden; }
        .gate { width: 50%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-decoration: none; transition: 0.6s; cursor: pointer; position: relative; }
        .t-gate { background: linear-gradient(to bottom, #010d0a, #0a0a0a); border-right: 2px solid #bf953f; }
        .t-gate:hover { background: #bf953f; }
        .t-gate:hover h1, .t-gate:hover p { color: #000; }
        .alfa-gate { background: linear-gradient(to bottom, #1a0000, #000); }
        .alfa-gate:hover { background: #ef3124; }
        h1 { font-size: clamp(30px, 8vw, 60px); font-weight: 900; letter-spacing: 5px; margin-bottom: 20px; transition: 0.3s; text-transform: uppercase; }
        .t-text { color: #bf953f; }
        .alfa-text { color: #ef3124; }
        .gate:hover .alfa-text { color: #fff; }
        p { font-size: 12px; text-transform: uppercase; letter-spacing: 3px; opacity: 0.7; color: #fff; margin-bottom: 10px; }
        .icon { font-size: 40px; }
    </style>
</head>
<body>

    <!-- ЛЕВАЯ ДВЕРЬ: Т-БАНК (ВЕДЕТ НА ТВОЮ ВИТРИНУ tbank.html) -->
    <a href="tbank.html" class="gate t-gate">
        <p>ПРЕМИАЛЬНЫЙ СЕРВИС</p>
        <h1 class="t-text">T-BANK</h1>
        <div class="icon">💎</div>
    </a>

    <!-- ПРАВАЯ ДВЕРЬ: АЛЬФА-БАНК (ПОКА ЗАКРЫТА) -->
    <a href="#" class="gate alfa-gate">
        <p>НОВЫЕ ВОЗМОЖНОСТИ</p>
        <h1 class="alfa-text">ALFA</h1>
        <div class="icon">🚩</div>
    </a>

</body>
</html>
